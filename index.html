<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat {
      width: 350px;
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 20px cyan;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      height: 300px;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      background: #222;
      margin: 5px 0;
      padding: 8px;
      border-radius: 8px;
    }

    .ai {
      background: #003344;
    }

    .input {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: cyan;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="chat">

  <div class="messages" id="messages"></div>

  <div class="input">
    <input id="text" placeholder="Bir şey yaz...">
    <button onclick="send()">Gönder</button>
  </div>

</div>

<script>
function send() {
  let input = document.getElementById("text");
  let msgBox = document.getElementById("messages");

  let text = input.value;
  if(text.trim() === "") return;

  // kullanıcı mesajı
  let user = document.createElement("div");
  user.className = "msg";
  user.innerText = "Sen: " + text;
  msgBox.appendChild(user);

  // AI cevap
  let ai = document.createElement("div");
  ai.className = "msg ai";

  ai.innerText = "AI: " + cevapVer(text);
  msgBox.appendChild(ai);

  input.value = "";
  msgBox.scrollTop = msgBox.scrollHeight;
}

// BASİT ZEKA (kurallar)
function cevapVer(text) {
  text = text.toLowerCase();

  if(text.includes("merhaba")) return "Merhaba 👋";
  if(text.includes("nasılsın")) return "İyiyim, sen nasılsın?";
  if(text.includes("adın ne")) return "Ben basit bir AI'yım 🤖";
  if(text.includes("selam")) return "Selam!";

  return "Bunu anlayamadım 🤔";
}
</script>

</body>
</html>
